name: CI/CD - Despachos Innovatech

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    name: Build, Push & deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login en docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: Build y push imagen docker
        uses: docker/build-push-action@v5
        with:
          context: ./Springboot-API-REST-DESPACHO
          file: ./Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/despachos-backend:latest

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_DESPACHOS }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY_DESPACHOS }} 
          proxy_host: ${{ secrets.FRONTEND_HOST }}
          proxy_username: ${{ secrets.EC2_USER }}
          proxy_key: ${{ secrets.FRONTEND_SSH_KEY }}
          script: |
            cd ~/despachos-backend
            echo "DB_ROOT_PASSWORD=Pass1234$" > .env
            echo "DB_NAME=bd_despachos" >> .env
            echo "DB_USERNAME=user_despachos" >> .env
            echo "DB_PASSWORD=Despachos1234$" >> .env
            docker pull rodribaeza/despachos-backend:latest
            docker compose down app
            docker compose up -d app
            docker image prune -f